name: maestro-cuda128
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - h5py
  - pip
  - numpy<2.0.0
  - pandas
  - scikit-learn
  - pytorch-cuda=12.8
  - tensorflow
  - tqdm
  - streamlit
  - scipy
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - symusic>=0.5.0
      - miditok
      - midi2audio
      - torch
      - torchvision
      - torchaudio
