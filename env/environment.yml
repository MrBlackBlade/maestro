name: maestro
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - h5py
  - pip
  - numpy<2.0.0
  - pandas
  - scikit-learn
  - tensorflow
  - tqdm
  - streamlit
  - scipy
  - pip:
      - symusic>=0.5.0
      - miditok
      - midi2audio
      - heartpy
      - sounddevice
      - fastapi
      - uvicorn[standard]
      - websockets
      - torch
      - torchvision
      - torchaudio
