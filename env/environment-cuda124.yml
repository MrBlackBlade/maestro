name: maestro-cuda124
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - h5py
  - pip
  - numpy<2.0.0
  - pandas
  - scikit-learn
  - pytorch-cuda=12.4
  - tensorflow
  - tqdm
  - streamlit
  - scipy
  - pip:
      - symusic>=0.5.0
      - miditok
      - midi2audio
      - heartpy
      - sounddevice
      - fastapi
      - uvicorn[standard]
      - websockets
      - --index-url https://download.pytorch.org/whl/cu124
      - torch
      - torchvision
      - torchaudio
